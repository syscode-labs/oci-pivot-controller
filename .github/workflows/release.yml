name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/syscode-labs/oci-pivot-controller

jobs:
  build-push:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ inputs.tag }}-${{ matrix.arch }}
            ${{ env.IMAGE }}:latest-${{ matrix.arch }}

  merge-manifests:
    needs: build-push
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:${{ inputs.tag }} \
            ${{ env.IMAGE }}:${{ inputs.tag }}-amd64 \
            ${{ env.IMAGE }}:${{ inputs.tag }}-arm64
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:latest-amd64 \
            ${{ env.IMAGE }}:latest-arm64
