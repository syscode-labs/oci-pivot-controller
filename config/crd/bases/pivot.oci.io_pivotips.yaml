---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: pivotips.pivot.oci.io
spec:
  group: pivot.oci.io
  names:
    kind: PivotIP
    listKind: PivotIPList
    plural: pivotips
    singular: pivotip
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.publicIP
      name: Public IP
      type: string
    - jsonPath: .status.assignedNode
      name: Node
      type: string
    - jsonPath: .spec.serviceRef.name
      name: Service
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PivotIP assigns a floating OCI reserved public IP to a Kubernetes Service.
          The controller elects the healthy node with the fewest current assignments,
          creates a secondary private IP on its VNIC, attaches a reserved public IP,
          and sets Service.spec.externalIPs so the node intercepts and routes traffic.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PivotIPSpec defines the desired state of PivotIP.
            properties:
              compartmentId:
                description: |-
                  CompartmentID is the OCI compartment OCID in which to create secondary private IPs
                  and reserved public IPs. If omitted, the controller's --compartment-id flag is used.
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: |-
                  NodeSelector restricts which nodes are eligible to hold the floating IP.
                  Nodes must also be Ready. If omitted, all Ready nodes are eligible.
                type: object
              serviceRef:
                description: |-
                  ServiceRef is the Service in the same namespace to assign a floating public IP to.
                  The controller will set Service.spec.externalIPs to the assigned OCI reserved public IP.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
            required:
            - serviceRef
            type: object
          status:
            description: PivotIPStatus defines the observed state of PivotIP.
            properties:
              assignedNode:
                description: AssignedNode is the name of the Kubernetes Node currently
                  holding the floating IP.
                type: string
              conditions:
                description: Conditions summarise the current state of this PivotIP.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              privateIPOCID:
                description: PrivateIPOCID is the OCID of the OCI secondary private
                  IP on the elected node's VNIC.
                type: string
              publicIP:
                description: PublicIP is the assigned OCI reserved public IP address
                  (e.g. "1.2.3.4").
                type: string
              publicIPOCID:
                description: PublicIPOCID is the OCID of the OCI reserved public IP
                  resource.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
