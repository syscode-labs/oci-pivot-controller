apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "oci-pivot-controller.fullname" . }}
  labels:
    {{- include "oci-pivot-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [pivot.oci.io]
    resources: [pivotips]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [pivot.oci.io]
    resources: [pivotips/status]
    verbs: [get, update, patch]
  - apiGroups: [pivot.oci.io]
    resources: [pivotips/finalizers]
    verbs: [update]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  # Leader election
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
